<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminExpress Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header id="logo">
        <h1>AdminExpress</h1>
        <img src="https://img.freepik.com/vector-gratis/usuario-negocios-cog_78370-7040.jpg?semt=ais_hybrid&w=80&q=100" alt="AdminExpress Logo">
    </header>

    <main>
        <div class="login-wrapper">
            <section class="banner-color">
                <h2>AdminExpress</h2>
                <img src="https://img.freepik.com/vector-gratis/usuario-negocios-cog_78370-7040.jpg?semt=ais_hybrid&w=80&q=100" alt="AdminExpress Logo">
            </section>

            <section class="form-container">
                <header>
                    <h3>--------BIENVENIDOS-------------</h3>
                    <p>POR FAVOR, INGRESE SU CORREO Y CONTRASEÑA</p>
                </header>

                <form>
                    <div class="input-group">
                        <label>CORREO</label>
                        <input type="email" placeholder="Ingresar su correo">
                    </div>
                    <div class="input-group">
                        <label>CONTRASEÑA</label>
                        <input type="password" placeholder="Ingresar su contraseña">
                    </div>
                    <a href="#" class="forgot">OLVIDO SU CONTRASEÑA?</a>
                    <button type="button" class="btn-main">INGRESAR</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>NO TIENE CUENTA? <a href="#" style="color: #4facfe;">REGISTRESE</a></p>
    </footer>
</body>
</html>
